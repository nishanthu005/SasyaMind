<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SasyaMind – Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F172A;
      color: #CBD5E1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 600; color: #F1F5F9; margin-bottom: 10px; }
    p  { font-size: 15px; color: #94A3B8; line-height: 1.6; max-width: 340px; margin-bottom: 28px; }
    .card {
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      width: 100%;
      max-width: 360px;
      text-align: left;
      margin-bottom: 20px;
    }
    .card-title { font-size: 13px; font-weight: 600; color: #4ADE80; margin-bottom: 14px; letter-spacing: 0.04em; }
    .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1E293B; font-size: 13px; }
    .row:last-child { border: none; }
    .label { color: #64748B; }
    .value { color: #CBD5E1; font-weight: 500; }
    .value.ok  { color: #4ADE80; }
    .value.warn { color: #F59E0B; }
    .value.bad  { color: #F87171; }
    button {
      width: 100%;
      max-width: 360px;
      padding: 12px;
      background: #4ADE80;
      color: #0F172A;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; transform: scale(0.99); }
    .hint { font-size: 12px; color: #475569; margin-top: 14px; }
  </style>
</head>
<body>
  <div class="icon">🌾</div>
  <h1>You're offline</h1>
  <p>No internet connection. Here's the last data saved from your farm.</p>

  <div class="card">
    <div class="card-title">LAST KNOWN FARM STATUS</div>
    <div id="cached-data">
      <div class="row"><span class="label">Loading cached data…</span></div>
    </div>
  </div>

  <button onclick="window.location.reload()">Try reconnecting ↺</button>
  <p class="hint" id="cached-at"></p>

  <script>
    // Read last dashboard snapshot from localStorage (written by the React app)
    try {
      const raw = localStorage.getItem('sasyamind_dashboard_cache');
      const meta = localStorage.getItem('sasyamind_dashboard_cache_at');
      const container = document.getElementById('cached-data');

      if (raw) {
        const d = JSON.parse(raw);
        const stats = d.farm_stats || {};
        const rows = [
          ['Farm health score', stats.health_score ? `${stats.health_score}%` : '—',
            stats.health_score >= 80 ? 'ok' : stats.health_score >= 60 ? 'warn' : 'bad'],
          ['Active alerts',     stats.active_alerts ?? '—',
            stats.active_alerts === 0 ? 'ok' : stats.active_alerts <= 2 ? 'warn' : 'bad'],
          ['Water saved',       stats.water_saved_pct ? `${stats.water_saved_pct}%` : '—', 'ok'],
          ['Predicted yield',   stats.predicted_yield ? `${stats.predicted_yield} t/ha` : '—', 'ok'],
        ];

        container.innerHTML = rows.map(([label, value, cls]) =>
          `<div class="row"><span class="label">${label}</span><span class="value ${cls}">${value}</span></div>`
        ).join('');

        if (meta) {
          const dt = new Date(meta);
          document.getElementById('cached-at').textContent =
            `Last updated: ${dt.toLocaleDateString('en-IN')} at ${dt.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}`;
        }
      } else {
        container.innerHTML = '<div class="row"><span class="label" style="color:#64748B">No cached data yet. Visit the dashboard once while online.</span></div>';
      }
    } catch (e) {
      console.warn('Could not read cached dashboard data', e);
    }
  </script>
</body>
</html>
