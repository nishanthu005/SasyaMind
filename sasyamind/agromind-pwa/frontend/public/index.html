<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colour (matches manifest + App.css background) -->
    <meta name="theme-color" content="#0F172A" />
    <meta name="background-color" content="#0F172A" />

    <!-- iOS PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SasyaMind" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Splash screens (iOS) — generate with https://progressier.com/pwa-icons-and-ios-splash-screen-generator -->
    <!-- <link rel="apple-touch-startup-image" href="/splash/splash-2048x2732.png" media="..."> -->

    <!-- Standard meta -->
    <title>SasyaMind – Smart Farming Assistant</title>
    <meta name="description" content="AI-powered smart farming: disease detection, yield prediction, irrigation scheduling, fertilizer recommendations" />
    <meta name="keywords" content="smart farming, AI agriculture, crop disease, yield prediction, India, kisan" />

    <!-- Open Graph (for sharing) -->
    <meta property="og:title"       content="SasyaMind – Smart Farming Assistant" />
    <meta property="og:description" content="AI-powered crop disease detection, yield prediction, and irrigation scheduling" />
    <meta property="og:type"        content="website" />
    <meta property="og:image"       content="/icons/icon-512x512.png" />
  </head>
  <body>
    <noscript>SasyaMind requires JavaScript. Please enable it to use the app.</noscript>
    <div id="root"></div>
  </body>
</html>
